<script>
  // Relógio
  function tick(){
    const n=new Date();
    const c=document.getElementById('sb-clock');
    const d=document.getElementById('sb-date');
    if(c)c.textContent=n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    if(d)d.textContent=n.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
  }
  tick();setInterval(tick,1000);

  function fmt(v,d=2){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});}
  function fmtK(v){const n=Number(v||0);return n>=1000?'R$ '+(n/1000).toFixed(1)+'k':fmt(v);}
  function pct(v){return Number(v||0).toFixed(1)+'%';}

  function prazoClass(d){if(!d)return '';const diff=Math.ceil((new Date(d+' 00:00')-new Date())/(1000*60*60*24));if(diff<0)return 'bad';if(diff<=3)return 'warn';return 'ok';}
  function prazoLabel(d){if(!d)return '';const diff=Math.ceil((new Date(d+' 00:00')-new Date())/(1000*60*60*24));if(diff<0)return Math.abs(diff)+'d atraso';if(diff===0)return 'Hoje';if(diff===1)return 'Amanhã';return new Date(d+' 00:00').toLocaleDateString('pt-BR');}



  function renderRelatorioExecutivo(){
    var wrap=document.getElementById('relatorio-exec-wrap');if(!wrap)return;
    var pedidosAll=JSON.parse(localStorage.getItem('allhair_pedidos')||'[]');
    var producoes=JSON.parse(localStorage.getItem('allhair_producoes2')||'[]');
    var recebimentos=JSON.parse(localStorage.getItem('allhair_recebimentos')||'[]');
    var despesas=JSON.parse(localStorage.getItem('allhair_despesas')||'[]');
    var estoque=JSON.parse(localStorage.getItem('allhair_estoque_v2')||'{}');
    var hoje=new Date();
    // Support month selector
    if(window._dashMes===undefined){window._dashMes=hoje.getMonth();window._dashAno=hoje.getFullYear();}
    var mes=window._dashMes, ano=window._dashAno;
    var isMesAtual=(mes===hoje.getMonth()&&ano===hoje.getFullYear());
    var mesLabel=document.getElementById('dash-mes-label');
    if(mesLabel){
      var d=new Date(ano,mes,1);
      mesLabel.textContent=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      mesLabel.textContent=mesLabel.textContent.charAt(0).toUpperCase()+mesLabel.textContent.slice(1);
    }
    var noMes=function(d){if(!d)return false;var dt=new Date(d+'T00:00');return dt.getMonth()===mes&&dt.getFullYear()===ano;};
    var semanaAgo=new Date(hoje); semanaAgo.setDate(semanaAgo.getDate()-7);

    // Metrics
    var fatMes=recebimentos.filter(function(r){return noMes(r.data);}).reduce(function(s,r){return s+Number(r.valor||0);},0);
    var despMes=despesas.filter(function(d){return d.ativo;}).reduce(function(s,d){return s+Number(d.valor||0);},0);
    var lucroMes=fatMes-despMes;
    var margem=fatMes>0?lucroMes/fatMes*100:0;
    var pedAbertos=pedidosAll.filter(function(p){return['recebido','producao','pronto'].includes(p.status);}).length;
    var pedSemana=pedidosAll.filter(function(p){return p.data&&new Date(p.data+'T00:00')>=semanaAgo;}).length;
    var kgSemana=producoes.filter(function(p){return p.etapa==='maquina'&&p.data&&new Date(p.data+'T00:00')>=semanaAgo;}).reduce(function(s,p){return s+Number(p.kg||0);},0);
    var atrasados=pedidosAll.filter(function(p){return['recebido','producao','pronto'].includes(p.status)&&p.entrega&&new Date(p.entrega+' 00:00')<hoje;}).length;
    var cruKg=Object.values(estoque.cru||{}).reduce(function(s,x){return s+Number(x.kg||0);},0);
    var viradoKg=Object.values(estoque.virado||{}).reduce(function(s,x){return s+Number(x.kg||0);},0);

    wrap.innerHTML='<div style="background:linear-gradient(135deg,#1e3a5f,#0f172a);border-radius:14px;padding:20px;margin-bottom:16px">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
        '<div>'+
          '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px">📊 Relatório Executivo</div>'+
          '<div style="font-size:16px;font-weight:800;color:#fff;margin-top:2px">Semana de '+semanaAgo.toLocaleDateString('pt-BR',{day:'numeric',month:'short'})+' a '+hoje.toLocaleDateString('pt-BR',{day:'numeric',month:'short'})+'</div>'+
        '</div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:24px;font-weight:900;color:'+(margem>=30?'#4ade80':margem>=15?'#fbbf24':'#f87171')+'">'+margem.toFixed(1)+'%</div>'+
          '<div style="font-size:11px;color:rgba(255,255,255,0.4)">margem do mês</div>'+
        '</div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">'+
      [
        {label:'Faturamento Mês',val:fmt(fatMes),sub:'Lucro: '+fmt(lucroMes),cor:fatMes>0?'#4ade80':'#f87171'},
        {label:'Pedidos Abertos',val:pedAbertos,sub:atrasados>0?atrasados+' atrasado(s)!':'Em dia',cor:atrasados>0?'#f87171':'#4ade80'},
        {label:'Kg Esta Semana',val:kgSemana.toFixed(1)+'kg',sub:pedSemana+' pedido(s) novos',cor:'#a5f3fc'},
        {label:'Em Pipeline',val:(cruKg+viradoKg).toFixed(1)+'kg',sub:'Cru: '+cruKg.toFixed(1)+' · Virado: '+viradoKg.toFixed(1),cor:'#c4b5fd'},
      ].map(function(k){
        return '<div style="background:rgba(255,255,255,0.08);border-radius:10px;padding:12px">'+
          '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:4px">'+k.label+'</div>'+
          '<div style="font-size:18px;font-weight:900;color:'+k.cor+'">'+k.val+'</div>'+
          '<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px">'+k.sub+'</div>'+
        '</div>';
      }).join('')+
      '</div>'+
      // Action items
      '<div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:12px">'+
        '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:8px;text-transform:uppercase">⚡ Ações desta semana</div>'+
        [
          atrasados>0?{cor:'#f87171',txt:atrasados+' pedido(s) em atraso — resolver urgente'}:null,
          margem<20&&fatMes>0?{cor:'#fbbf24',txt:'Margem baixa ('+margem.toFixed(1)+'%) — revisar preços ou custos'}:null,
          cruKg>10?{cor:'#a5f3fc',txt:cruKg.toFixed(1)+'kg no estoque cru — agendar envio para faccionista'}:null,
          viradoKg>5?{cor:'#4ade80',txt:viradoKg.toFixed(1)+'kg virado pronto para embalar'}:null,
          pedAbertos===0?{cor:'#4ade80',txt:'Sem pedidos em aberto — hora de prospectar novos clientes'}:null,
        ].filter(Boolean).slice(0,4).map(function(a){
          return '<div style="font-size:12px;color:'+a.cor+';margin-bottom:4px;font-weight:600">· '+a.txt+'</div>';
        }).join('')||'<div style="font-size:12px;color:rgba(255,255,255,0.4)">Tudo em ordem esta semana!</div>'+
      '</div>';
  }


  function fecharAvaliacao(){
    var el=document.getElementById('overlay-avaliacao');
    if(el)el.classList.remove('open');
  }

  function abrirAvaliacaoMes(){
    var overlay=document.getElementById('overlay-avaliacao');
    var body=document.getElementById('avaliacao-body');
    if(!overlay||!body)return;
    overlay.classList.add('open');
    try{
      gerarAvaliacaoMes(body);
    }catch(e){
      body.innerHTML='<div style="padding:24px;color:#ef4444;font-size:13px"><strong>Erro:</strong> '+e.message+'<br><br><code style="font-size:11px;color:#64748b">'+e.stack+'</code></div>';
      console.error('Avaliacao error:',e);
    }
  }

  function gerarAvaliacaoMes(body){
    var hoje=new Date();
    var mes=hoje.getMonth(), ano=hoje.getFullYear();
    var mesPrev=mes===0?11:mes-1, anoPrev=mes===0?ano-1:ano;
    var nomeMes=hoje.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    var noMes=function(d,m,a){if(!d)return false;var s=d.substring(0,7);var mm=(m===undefined?mes:m);var aa=(a===undefined?ano:a);return s===(aa+'-'+(mm+1<10?'0'+(mm+1):(mm+1)));};

    // Load all data
    var pedidosAll=JSON.parse(localStorage.getItem('allhair_pedidos')||'[]');
    var producoes=JSON.parse(localStorage.getItem('allhair_producoes2')||'[]');
    var recebimentos=JSON.parse(localStorage.getItem('allhair_recebimentos')||'[]');
    var despesasAll=JSON.parse(localStorage.getItem('allhair_despesas')||'[]');
    var compras=JSON.parse(localStorage.getItem('allhair_compras')||'[]');
    var aReceber=JSON.parse(localStorage.getItem('allhair_a_receber')||'[]');
    var sociosAll=JSON.parse(localStorage.getItem('allhair_socios')||'[]');
    var cfg=JSON.parse(localStorage.getItem('allhair_config')||'{}');
    var metas=cfg.metas||{};

    // ===== DADOS FINANCEIROS REAIS =====
    var fatBruto=recebimentos.filter(function(r){return noMes(r.data);}).reduce(function(s,r){return s+Number(r.valor||0);},0);
    var fatPrev=recebimentos.filter(function(r){return noMes(r.data,mesPrev,anoPrev);}).reduce(function(s,r){return s+Number(r.valor||0);},0);

    // Custos variáveis
    var custMP=compras.filter(function(c){return noMes(c.data);}).reduce(function(s,c){return s+Number(c.total||c.valor||0);},0);

    var comissaoVal=0;
    try{
      var comissoesAll=JSON.parse(localStorage.getItem('allhair_comissoes')||'[]');
      var repsAll=JSON.parse(localStorage.getItem('allhair_representantes')||'[]');
      comissaoVal=comissoesAll.filter(function(cm){return noMes(cm.data||cm.criadoEm);}).reduce(function(s,cm){return s+Number(cm.valor||0);},0);
      if(comissaoVal===0){
        pedsMes.forEach(function(ped){
          var rep=repsAll.find(function(r){return r.id===ped.repId;});
          var pct=rep?Number(rep.comissao||0)/100:0;
          comissaoVal+=(ped.itens||[]).reduce(function(s,i){return s+Number(i.total||0);},0)*pct;
        });
      }
    }catch(e2){comissaoVal=0;}
    var comissaoPct=fatBruto>0?comissaoVal/fatBruto*100:0;

    var impostosPct=(cfg.aliquota||6)/100;
    var impostosVal=fatBruto*impostosPct;
    var custVar=custMP+comissaoVal+impostosVal;

    // Custos fixos
    var custFixo=despesasAll.filter(function(d){return d.tipo==='fixo'&&d.ativo;}).reduce(function(s,d){return s+Number(d.valor||0);},0);
    var custVar2=despesasAll.filter(function(d){return d.tipo==='variavel'&&d.ativo;}).reduce(function(s,d){return s+Number(d.valor||0);},0);
    custVar+=custVar2;

    var custTotal=custVar+custFixo;

    // Margens
    var margemContrib=fatBruto>0?(fatBruto-custVar)/fatBruto*100:0; // MC = (Fat - CustVar) / Fat
    var margemBruta=fatBruto>0?(fatBruto-custMP)/fatBruto*100:0;   // MB = (Fat - MP) / Fat
    var lucroLiq=fatBruto-custTotal;
    var margemLiq=fatBruto>0?lucroLiq/fatBruto*100:0;              // ML = Lucro / Fat
    var pontEq=margemContrib>0?custFixo/(margemContrib/100):0;     // Ponto Equilíbrio

    // Crescimento
    var crescFat=fatPrev>0?(fatBruto-fatPrev)/fatPrev*100:0;

    // Sócios - distribuição real
    var sociosList=sociosAll.filter(function(s){return s.tipo==='socio';});
    var totalPart=sociosList.reduce(function(s,sc){return s+Number(sc.participacao||0);},0);
    var reservaPct=cfg.reservaPct||30;
    var lucroDistribuivel=Math.max(0,lucroLiq*(1-reservaPct/100));
    var prolaboreTotal=sociosList.reduce(function(s,sc){return s+Number(sc.prolabore||0);},0);

    // Produção
    var kgMes=producoes.filter(function(p){return p.etapa==='maquina'&&noMes(p.data);}).reduce(function(s,p){return s+Number(p.kg||0);},0);
    var pcsMes=producoes.filter(function(p){return p.etapa==='embalagem'&&noMes(p.data);}).reduce(function(s,p){return s+Number(p.pacotes||0);},0);
    var cfgProd=cfg.producao||{};
    var capMensal=((cfgProd.maqMeia||2)*(cfgProd.prodMeia||2)+(cfgProd.maqLiso||4)*(cfgProd.prodLiso||2.5)+(cfgProd.maqMini||4)*(cfgProd.prodMini||1.2))*22;
    var eficiencia=capMensal>0?kgMes/capMensal*100:0;

    // Clientes
    var pedsMes=pedidosAll.filter(function(p){return noMes(p.data);});
    var clientesMes=new Set(pedsMes.map(function(p){return p.clienteId||p.clienteNome;})).size;
    var ticketMedio=pedsMes.length?pedsMes.reduce(function(s,p){return s+(p.itens||[]).reduce(function(s2,i){return s2+Number(i.total||0);},0);},0)/pedsMes.length:0;
    var inadimpl=aReceber.filter(function(r){return r.status!=='pago'&&r.vencimento&&new Date(r.vencimento+' 00:00')<hoje;});
    var totalInad=inadimpl.reduce(function(s,r){return s+Number(r.valor||0);},0);

    // Meta
    var metaFat=Number(metas.fat||0);
    var pctMeta=metaFat>0?fatBruto/metaFat*100:null;

    // ===== SCORING =====
    var scores=[];
    var acoes=[], positivos=[], negativos=[];

    var sMargLiq=margemLiq>=35?100:margemLiq>=25?80:margemLiq>=15?60:margemLiq>=5?40:20;
    scores.push({l:'Margem Líq.',s:sMargLiq,p:25,v:margemLiq.toFixed(1)+'%'});

    var sMargC=margemContrib>=50?100:margemContrib>=40?80:margemContrib>=30?60:margemContrib>=20?40:20;
    scores.push({l:'Margem Contrib.',s:sMargC,p:20,v:margemContrib.toFixed(1)+'%'});

    var sMeta=pctMeta===null?50:pctMeta>=100?100:pctMeta>=80?70:pctMeta>=60?50:25;
    scores.push({l:'Meta Fat.',s:sMeta,p:15,v:pctMeta!==null?Math.round(pctMeta)+'%':'Sem meta'});

    else if(pctMeta!==null&&pctMeta<80)acoes.push({prio:'alta',txt:'Faltaram '+fmt(metaFat-fatBruto)+' para bater a meta de faturamento'});

    var sCresc=crescFat>=15?100:crescFat>=5?80:crescFat>=0?65:crescFat>=-10?40:20;
    scores.push({l:'Crescimento',s:sCresc,p:15,v:(crescFat>=0?'+':'')+crescFat.toFixed(1)+'%'});
    if(crescFat>=10)positivos.push('Crescimento forte de +'+crescFat.toFixed(1)+'% vs mês anterior');
    else if(crescFat<0)acoes.push({prio:'media',txt:'Queda de '+Math.abs(crescFat).toFixed(1)+'% — contatar clientes inativos e reforçar prospecção'});

    var sEfic=eficiencia>=80?100:eficiencia>=60?75:eficiencia>=40?55:35;
    scores.push({l:'Produção',s:sEfic,p:15,v:eficiencia.toFixed(0)+'%'});
    if(eficiencia<50&&kgMes>0)acoes.push({prio:'media',txt:'Capacidade produtiva em apenas '+eficiencia.toFixed(0)+'% — avaliar aumentar pedidos ou reduzir máquinas ativas'});

    var sInad=totalInad===0?100:totalInad<fatBruto*0.02?80:totalInad<fatBruto*0.05?55:30;
    scores.push({l:'Inadimplência',s:sInad,p:10,v:fatBruto>0?(totalInad/fatBruto*100).toFixed(1)+'%':'0%'});
    if(totalInad>0)acoes.push({prio:totalInad>fatBruto*0.05?'alta':'media',txt:'Cobrar '+inadimpl.length+' cliente(s) — '+fmt(totalInad)+' em atraso'});
    else positivos.push('Zero inadimplência no mês!');

    var totalPeso=scores.reduce(function(s,x){return s+x.p;},0);
    var nota=scores.reduce(function(s,x){return s+x.s*x.p;},0)/totalPeso/10;
    var notaCor=nota>=8?'#10b981':nota>=6?'#f59e0b':nota>=4?'#f97316':'#ef4444';
    var notaLabel=nota>=8?'Excelente 🏆':nota>=6?'Bom 👍':nota>=4?'Regular ⚠️':'Crítico 🚨';

    acoes.sort(function(a,b){return (a.prio==='alta'?0:1)-(b.prio==='alta'?0:1);});

    // ===== RENDER =====
    body.innerHTML=
      // Score header
      '<div style="background:linear-gradient(135deg,#1e3a5f,#0f172a);padding:24px">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'+
          '<div>'+
            '<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);text-transform:uppercase;margin-bottom:4px">'+nomeMes.charAt(0).toUpperCase()+nomeMes.slice(1)+'</div>'+

          '</div>'+
        '</div>'+
      '</div>'+

      '<div style="padding:20px;display:flex;flex-direction:column;gap:16px">'+

      // ===== FINANCEIRO COMPLETO =====
      '<div>'+
        '<div style="font-weight:800;font-size:14px;margin-bottom:10px;color:var(--purple)">💰 Resultado Financeiro Completo</div>'+

          [

            {label:'(=) MARGEM DE CONTRIBUIÇÃO',val:fatBruto-custVar,tipo:'mc',bold:true,bg:'#ede9fe'},

          ].map(function(r){

            var cor=r.tipo==='fat'?'var(--purple)':r.tipo==='custo'||r.tipo==='reserva'?'#ef4444':r.tipo==='mc'?'var(--purple)':r.tipo==='lucro'?(lucroLiq>=0?'#10b981':'#ef4444'):r.tipo==='bolso'?'#10b981':r.tipo==='pct'?(r.val>=20?'#10b981':r.val>=10?'#f59e0b':'#ef4444'):'var(--text)';

          // Ponto de equilíbrio
          '<div style="padding:10px 16px;background:#fef3c7;display:flex;justify-content:space-between">'+

          '</div>'+

            (fatBruto>=pontEq?'✅ Acima do ponto de equilíbrio — lucro de '+fmt(fatBruto-pontEq):'🚨 Abaixo do ponto de equilíbrio — faltam '+fmt(pontEq-fatBruto))+
          '</div>':'')+
        '</div>'+

      // ===== BOLSO POR SÓCIO =====
      (sociosList.length?

          '<div style="font-weight:800;font-size:14px;margin-bottom:10px;color:#10b981">💵 No Bolso — Por Sócio</div>'+
          '<div style="display:grid;grid-template-columns:repeat('+Math.min(3,sociosList.length)+',1fr);gap:10px">'+
          sociosList.map(function(sc){

          [
            {l:'Kg produzidos',v:kgMes.toFixed(1)+'kg'},

            {l:'Eficiência',v:eficiencia.toFixed(0)+'%',cor:eficiencia>=70?'#10b981':eficiencia>=50?'#f59e0b':'#ef4444'},
            {l:'Custo MP/kg',v:kgMes>0?fmt(custMP/kgMes)+'/kg':'—'},
          ].map(function(k){
            return '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">'+

              '<span style="font-weight:700;color:'+(k.cor||'var(--text)')+'">'+k.v+'</span>'+

        '</div>'+
        '<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px">'+

          [

            {l:'Crescimento',v:(crescFat>=0?'+':'')+crescFat.toFixed(1)+'%',cor:crescFat>=0?'#10b981':'#ef4444'},

        '</div>'+

      // ===== PONTOS E AÇÕES =====
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+

          '<div style="font-weight:800;color:#15803d;margin-bottom:8px">✅ Pontos Positivos</div>'+
          (positivos.length?positivos.map(function(p){return '<div style="font-size:12px;color:#166534;margin-bottom:5px">· '+p+'</div>';}).join(''):
          '<div style="font-size:12px;color:#166534">Continue cadastrando dados para análise completa.</div>')+
        '</div>'+
        '<div style="background:#fef2f2;border-radius:10px;padding:14px">'+
          '<div style="font-weight:800;color:#dc2626;margin-bottom:8px">⚠️ Atenção</div>'+
          (negativos.length?negativos.map(function(p){return '<div style="font-size:12px;color:#991b1b;margin-bottom:5px">· '+p+'</div>';}).join(''):
          '<div style="font-size:12px;color:#166534">Nenhum ponto crítico!</div>')+

      '</div>'+

      (acoes.length?
        '<div>'+

          {icon:'📈',titulo:'Mais Volume',txt:'Capacidade atual: '+eficiencia.toFixed(0)+'%. Mais kg produzidos dilui custo fixo de '+fmt(custFixo)+'/mês'},

      '</div>';

    document.getElementById('avaliacao-titulo').textContent='📊 Avaliação — '+nomeMes.charAt(0).toUpperCase()+nomeMes.slice(1);

  function dashMesAnterior(){
    if(window._dashMes===0){window._dashMes=11;window._dashAno--;}
    else window._dashMes--;
    init();
  }
  function dashMesProximo(){
    var hoje=new Date();
    if(window._dashMes===hoje.getMonth()&&window._dashAno===hoje.getFullYear())return;
    if(window._dashMes===11){window._dashMes=0;window._dashAno++;}
    else window._dashMes++;
    init();
  }
  function dashMesNome(){
    var d=new Date(window._dashAno||new Date().getFullYear(),window._dashMes||0,1);
    return d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  }

  function init(){
    const pedidos      = JSON.parse(localStorage.getItem('allhair_pedidos')        ||'[]');
    const clientes     = JSON.parse(localStorage.getItem('allhair_clientes')        ||'[]');
    const produtos     = JSON.parse(localStorage.getItem('allhair_produtos')        ||'[]');
    const producoes    = JSON.parse(localStorage.getItem('allhair_producoes2')      ||'[]');
    const envios       = JSON.parse(localStorage.getItem('allhair_envios_v2')       ||'[]');
    const faccionistas = JSON.parse(localStorage.getItem('allhair_faccionistas')    ||'[]');
    const compras      = JSON.parse(localStorage.getItem('allhair_compras')         ||'[]');
    const estoque      = JSON.parse(localStorage.getItem('allhair_estoque_v2')      ||'{}');
    const recebimentos = JSON.parse(localStorage.getItem('allhair_recebimentos')    ||'[]');
    const pagamentos   = JSON.parse(localStorage.getItem('allhair_pagamentos')      ||'[]');
    const despesas     = JSON.parse(localStorage.getItem('allhair_despesas')        ||'[]');
    const reservas     = JSON.parse(localStorage.getItem('allhair_reservas')        ||'{}');
    const config       = JSON.parse(localStorage.getItem('allhair_config')          ||'{}');
    const metas        = config.metas||{};
    const sessao       = JSON.parse(localStorage.getItem('allhair_sessao')          ||'{}');

    const now=new Date();
    const hoje=now.toISOString().split('T')[0];
    const mes=now.getMonth(), ano=now.getFullYear();
    const diasNoMes=new Date(ano,mes+1,0).getDate();
    const diaAtual=now.getDate();
    const diasPassados=diaAtual;
    const diasRestantes=diasNoMes-diaAtual;
    const ritmo=diasPassados/diasNoMes;

    const h=now.getHours();
    const nome=sessao.nome||'';
    document.getElementById('topbar-saud').textContent=(h<12?'Bom dia, meu patrão!':h<18?'Boa tarde, meu patrão!':'Boa noite, meu patrão!');
    document.getElementById('topbar-saud').textContent=(h<12?'Bom dia, meu patrão!':h<18?'Boa tarde, meu patrão!':'Boa noite, meu patrão!');
    document.getElementById('mes-badge').textContent=now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());

    const noMes=dt=>{if(!dt)return false;const d=new Date(dt+' 00:00');return d.getMonth()===mes&&d.getFullYear()===ano;};

    // ===== MÉTRICAS =====
    const getSaldo=p=>{const t=(p.itens||[]).reduce((s,i)=>s+Number(i.total||0),0);return Math.max(0,t-Number(p.entrada||0));};
    const filaAberta=pedidos.filter(p=>['recebido','producao','pronto'].includes(p.status));
    const pedAtraso=filaAberta.filter(p=>p.entrega&&new Date(p.entrega+' 00:00')<now);
    const totalReceber=pedidos.filter(p=>p.status!=='finalizado').reduce((s,p)=>s+getSaldo(p),0);
    const totalPagarForn=compras.filter(c=>c.statusPgto==='pendente').reduce((s,c)=>s+Number(c.valor||0),0);
    const totalPagarFacc=envios.filter(e=>e.status==='devolvido'&&!e.pago).reduce((s,e)=>s+Number(e.valor||0),0);
    const totalPagar=totalPagarForn+totalPagarFacc;
    const receitaMes=recebimentos.filter(r=>noMes(r.data)).reduce((s,r)=>s+Number(r.valor||0),0);
    const despesasMes=pagamentos.filter(p=>noMes(p.data)).reduce((s,p)=>s+Number(p.valor||0),0)+despesas.filter(d=>d.tipo==='fixo'&&d.ativo).reduce((s,d)=>s+Number(d.valor||0),0);
    const lucro=receitaMes-despesasMes;
    const margem=receitaMes>0?lucro/receitaMes*100:0;
    const fatBruto=pedidos.filter(p=>{if(!p.data)return false;const d=new Date(p.data+' 00:00');return d.getMonth()===mes&&d.getFullYear()===ano;}).reduce((s,p)=>(p.itens||[]).reduce((ss,i)=>ss+Number(i.total||0),0)+s,0);
    const kgHoje=producoes.filter(p=>p.data===hoje&&p.etapa==='maquina').reduce((s,p)=>s+Number(p.kg||0),0);
    const virando=envios.filter(e=>e.status==='enviado');
    const aPagarFacc=envios.filter(e=>e.status==='devolvido'&&!e.pago).reduce((s,e)=>s+Number(e.valor||0),0);

    // PROJEÇÃO
    const metaFat=Number(metas.fat||0);
    const projecaoMes=ritmo>0?fatBruto/ritmo:0;
    const pctMeta=metaFat>0?Math.min(100,fatBruto/metaFat*100):0;
    const faltaMeta=Math.max(0,metaFat-fatBruto);
    const porDia=diasPassados>0?fatBruto/diasPassados:0;
    const necessarioPorDia=diasRestantes>0?faltaMeta/diasRestantes:0;
    const noRitmo=projecaoMes>=metaFat*0.9;

    // META SEMANAL
    const metaSemana=metaFat>0?metaFat/4:0;
    const inicioSemana=new Date(now);
    inicioSemana.setDate(now.getDate()-now.getDay());
    const fatSemana=recebimentos.filter(r=>{if(!r.data)return false;const d=new Date(r.data+' 00:00');return d>=inicioSemana&&d<=now;}).reduce((s,r)=>s+Number(r.valor||0),0);
    const pctSemana=metaSemana>0?Math.min(100,fatSemana/metaSemana*100):0;

    // ===== ALERTAS =====
    const alertas=[];
    if(pedAtraso.length) alertas.push({cls:'red',icon:'!',txt:`${pedAtraso.length} pedido(s) em atraso`,sub:pedAtraso.map(p=>p.clienteNome).join(', '),href:'pedidos.html'});
    const vencidosRec=pedidos.filter(p=>p.status!=='finalizado'&&getSaldo(p)>0&&p.vencimento&&new Date(p.vencimento+' 00:00')<now);
    if(vencidosRec.length) alertas.push({cls:'orange',icon:'!',txt:`${vencidosRec.length} boleto(s) vencido(s)`,sub:fmt(vencidosRec.reduce((s,p)=>s+getSaldo(p),0))+' a receber',href:'financeiro.html'});
        if(metaFat>0&&!noRitmo&&fatBruto<metaFat) alertas.push({cls:'yellow',icon:'!',txt:'Ritmo abaixo da meta',sub:`Precisa de ${fmt(necessarioPorDia)}/dia nos próximos ${diasRestantes} dias`,href:'financeiro.html'});

    renderRelatorioExecutivo();
    document.getElementById('alertas').innerHTML=alertas.map(a=>`
      <a class="alerta ${a.cls}" href="${a.href}">
        <span style="font-size:14px;font-weight:900">${a.icon}</span>
        <div class="alerta-text"><strong>${a.txt}</strong> — ${a.sub}</div>
        <span>→</span>
      </a>`).join('');

    // ===== META HERO =====
    const cor=pctMeta>=100?'#16a34a':pctMeta>=60?'#f5c400':'#e8197a';
    const r=70,cx=90,cy=80;
    const startA=-Math.PI, endA=0;
    const angle=startA+(endA-startA)*Math.min(1,pctMeta/100);
    const x1=cx+r*Math.cos(startA),y1=cy+r*Math.sin(startA);
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    const large=angle-startA>Math.PI?1:0;
    const gauge=`<svg width="180" height="100" viewBox="0 0 180 100">
      <path d="M${x1},${y1} A${r},${r} 0 1,1 ${cx+r},${cy}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="14" stroke-linecap="round"/>
      ${pctMeta>0?`<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2}" fill="none" stroke="${cor}" stroke-width="14" stroke-linecap="round"/>`:''}
    </svg>`;

    const outrasMetasHtml=Object.entries({
      'Margem':{val:margem,meta:Number(metas.margem||0),fmt:v=>pct(v)},
      'Produção kg':{val:producoes.filter(p=>p.etapa==='maquina'&&noMes(p.data)).reduce((s,p)=>s+Number(p.kg||0),0),meta:Number(metas['prod-kg']||0),fmt:v=>v.toFixed(1)+'kg'},
      'Lucro Líquido':{val:lucro,meta:Number(metas.lucro||0),fmt:v=>fmt(v),showAlways:true},
    }).filter(([,m])=>m.meta>0||m.showAlways).map(([label,m])=>{
      const p=Math.min(100,m.meta>0?m.val/m.meta*100:0);
      const c=p>=100?'#16a34a':p>=60?'#f5c400':'#e8197a';
      return `<div class="meta-bar-row">
        <span class="meta-bar-label">${label}</span>
        <div class="meta-bar-track"><div class="meta-bar-fill" style="width:${p}%;background:${c}"></div></div>
        <span class="meta-bar-val">${m.fmt(m.val)}<span style="opacity:.4"> / ${m.fmt(m.meta)}</span></span>
      </div>`;
    }).join('');

    document.getElementById('meta-hero-wrap').innerHTML=metaFat>0?`
      <div class="meta-hero">
        <div class="gauge-wrap">
          ${gauge}
          <div class="gauge-pct" style="color:${cor}">${Math.round(pctMeta)}%</div>
          <div class="gauge-lbl">da meta</div>
        </div>
        <div class="meta-info">
          <div class="meta-titulo">Faturamento do mês</div>
          <div class="meta-fat">${fmt(fatBruto)}</div>
          <div class="meta-de">de ${fmt(metaFat)}</div>
          <div class="meta-bars" style="margin-top:12px">${outrasMetasHtml}</div>
        </div>
        <div class="meta-projecoes">
          <div class="proj-box">
            <div class="proj-label">Projeção do mês</div>
            <div class="proj-val" style="color:${noRitmo?'#4ade80':'#f87171'}">${fmt(projecaoMes)}</div>
            <div class="proj-sub" style="color:${noRitmo?'rgba(74,222,128,.7)':'rgba(248,113,113,.7)'}">${noRitmo?'No ritmo certo':'Abaixo do ritmo'}</div>
          </div>
          <div class="proj-box">
            <div class="proj-label">Falta para meta</div>
            <div class="proj-val" style="color:${faltaMeta===0?'#4ade80':'#fbbf24'}">${faltaMeta===0?'Bateu!':fmt(faltaMeta)}</div>
            <div class="proj-sub" style="color:rgba(255,255,255,.4)">${diasRestantes}d restantes · ${fmt(necessarioPorDia)}/dia</div>
          </div>
          <div class="proj-box">
            <div class="proj-label">Ritmo atual</div>
            <div class="proj-val" style="color:#e2e8f0">${fmt(porDia)}/dia</div>
            <div class="proj-sub" style="color:rgba(255,255,255,.4)">Média dos últimos ${diasPassados}d</div>
          </div>
        </div>
      </div>`:`<div style="background:var(--purple-light);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;font-size:13px;font-weight:600;color:var(--purple)">
        Meta não configurada. <a href="configuracoes.html" style="color:var(--pink);text-decoration:underline">Definir metas</a> para ver o painel de progresso.
      </div>`;

    // ===== META SEMANAL =====
    const nomeDias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const diasSemana=[];
    for(let i=0;i<7;i++){
      const d=new Date(inicioSemana);d.setDate(inicioSemana.getDate()+i);
      const dt=d.toISOString().split('T')[0];
      const rec=recebimentos.filter(r=>r.data===dt).reduce((s,r)=>s+Number(r.valor||0),0);
      diasSemana.push({nome:nomeDias[d.getDay()],num:d.getDate(),val:rec,isHoje:dt===hoje,isPassado:d<now&&dt!==hoje});
    }
    const maxDia=Math.max(...diasSemana.map(d=>d.val),1);
    document.getElementById('semana-wrap').innerHTML=`
      <div class="semana-card">
        <div class="semana-title">
          <span>Esta semana</span>
          ${metaSemana>0?`<div style="display:flex;align-items:center;gap:10px">
            <div style="background:var(--bg);border-radius:20px;height:6px;width:120px;overflow:hidden"><div style="height:100%;border-radius:20px;background:linear-gradient(90deg,var(--pink),var(--purple));width:${pctSemana}%"></div></div>
            <span style="font-size:12px;font-weight:700;color:${pctSemana>=100?'var(--green)':pctSemana>=60?'var(--orange)':'var(--red)'}">${fmt(fatSemana)} / ${fmt(metaSemana)}</span>
          </div>`:''}
        </div>
        <div class="semana-dias">
          ${diasSemana.map(d=>`<div class="dia-box${d.isHoje?' hoje':''}${d.isPassado?' passado':''}">
            <div class="dia-nome">${d.nome}</div>
            <div class="dia-num">${d.num}</div>
            ${d.val>0?`<div class="dia-val">${fmtK(d.val)}</div>`:'<div class="dia-val" style="color:var(--text3)">—</div>'}
            <div class="dia-bar"><div class="dia-bar-fill" style="width:${d.val>0?Math.round(d.val/maxDia*100):0}%"></div></div>
          </div>`).join('')}
        </div>
      </div>`;

    // ===== KPIs =====
    document.getElementById('kpi-grid').innerHTML=`
      <div class="kpi g">
        <div class="kpi-top"><span class="kpi-icon">↑</span><span class="kpi-badge ${totalReceber<5000?'ok':'warn'}">${totalReceber===0?'Zerado':'Em aberto'}</span></div>
        <div class="kpi-val" style="color:var(--green)">${fmtK(totalReceber)}</div>
        <div class="kpi-label">A Receber</div>
        <div class="kpi-sub">${pedidos.filter(p=>p.status!=='finalizado'&&getSaldo(p)>0).length} pedido(s)</div>
      </div>
      <div class="kpi r">
        <div class="kpi-top"><span class="kpi-icon">↓</span><span class="kpi-badge ${totalPagar===0?'ok':'warn'}">${totalPagar===0?'Em dia':'Pendente'}</span></div>
        <div class="kpi-val" style="color:var(--red)">${fmtK(totalPagar)}</div>
        <div class="kpi-label">A Pagar</div>
        <div class="kpi-sub">Forn + Faccionistas</div>
      </div>
      <div class="kpi b">
        <div class="kpi-top"><span class="kpi-icon">=</span><span class="kpi-badge ${lucro>=0?'ok':'bad'}">${pct(margem)}</span></div>
        <div class="kpi-val" style="color:${lucro>=0?'var(--blue)':'var(--red)'}">${fmtK(lucro)}</div>
        <div class="kpi-label">Resultado do mês</div>
        <div class="kpi-sub">Receita ${fmt(receitaMes)}</div>
      </div>
      <div class="kpi p">
        <div class="kpi-top"><span class="kpi-icon">◈</span><span class="kpi-badge ${pedAtraso.length===0?'ok':'bad'}">${pedAtraso.length>0?pedAtraso.length+' atraso(s)':'Em dia'}</span></div>
        <div class="kpi-val">${filaAberta.length}</div>
        <div class="kpi-label">Pedidos em aberto</div>
        <div class="kpi-sub">${pedidos.filter(p=>p.status==='pronto').length} pronto(s) · ${kgHoje.toFixed(2)}kg hoje</div>
      </div>`;

    // ===== FILA + FINANCEIRO =====
    const filaSort=filaAberta.sort((a,b)=>new Date(a.data)-new Date(b.data));
    const getProduzidoPed=(pedId,prodId)=>producoes.filter(p=>p.etapa==='maquina'&&(p.abatimentos||[]).some(a=>a.pedidoId===pedId&&a.prodId===prodId)).reduce((s,p)=>{const ab=(p.abatimentos||[]).find(a=>a.pedidoId===pedId&&a.prodId===prodId);return s+Number(ab?.pecas||0);},0);
    const getPct=ped=>{
      const total=(ped.itens||[]).reduce((s,i)=>{const p=produtos.find(x=>x.id===i.prodId);const u=p?(p['unid-pacote']||1):1;return s+Number(i.qtd||0)*u;},0);
      const res=reservas[ped.id]||{};const resEmb=Object.values(res).reduce((s,r)=>s+Number(r.embalado||0),0);
      const prod=(ped.itens||[]).reduce((s,i)=>s+getProduzidoPed(ped.id,i.prodId),0);
      return total>0?Math.min(100,Math.round((prod+resEmb)/total*100)):0;
    };

    document.getElementById('bottom-grid').innerHTML=`
      <div class="card">
        <div class="card-header"><div class="card-title">Fila de Producao</div><a class="card-link" href="pedidos.html">Ver todos</a></div>
        ${filaSort.slice(0,7).map((p,i)=>{
          const pc=getPct(p);
          const cor=pc===100?'var(--green)':pc>50?'var(--yellow)':'var(--pink)';
          return `<a class="ped-row" href="pedidos.html">
            <div class="ped-pos">${i+1}</div>
            <div class="ped-info"><div class="ped-nome">${p.clienteNome||'—'}</div><div class="ped-num">${p.numero||'—'}</div></div>
            <div class="ped-prog"><div class="ped-prog-bar"><div class="ped-prog-fill" style="width:${pc}%;background:${cor}"></div></div><div class="ped-pct" style="color:${cor}">${pc}%</div></div>
            ${p.entrega?`<span class="ped-prazo ${prazoClass(p.entrega)}">${prazoLabel(p.entrega)}</span>`:''}
          </a>`;
        }).join('')||'<div class="mini-empty">Nenhum pedido em aberto</div>'}
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Financeiro do Mês</div><a class="card-link" href="financeiro.html">Ver</a></div>
        <div class="fin-row"><span class="fin-label">Faturamento bruto</span><span class="fin-val" style="color:var(--purple)">${fmt(fatBruto)}</span></div>
        <div class="fin-row"><span class="fin-label">Recebido</span><span class="fin-val" style="color:var(--green)">${fmt(receitaMes)}</span></div>
        <div class="fin-row"><span class="fin-label">Pago</span><span class="fin-val" style="color:var(--red)">${fmt(despesasMes)}</span></div>
        <div class="fin-row" style="background:var(--bg)"><span class="fin-label" style="font-weight:800">Resultado</span><span class="fin-val" style="color:${lucro>=0?'var(--green)':'var(--red)'};font-size:14px">${fmt(lucro)}</span></div>
        <div class="fin-row"><span class="fin-label">A receber</span><span class="fin-val" style="color:var(--blue)">${fmt(totalReceber)}</span></div>
        <div class="fin-row"><span class="fin-label">A pagar</span><span class="fin-val" style="color:var(--orange)">${fmt(totalPagar)}</span></div>
        <div class="fin-row"><span class="fin-label">Margem</span><span class="fin-val" style="color:${margem>=30?'var(--green)':margem>=15?'var(--orange)':'var(--red)'}">${pct(margem)}</span></div>
      </div>`;

    // ===== GRÁFICOS =====
    // Top produtos
    const topProd={};
    pedidos.filter(p=>{if(!p.data)return false;const d=new Date(p.data+' 00:00');return d.getMonth()===mes&&d.getFullYear()===ano;})
      .forEach(p=>(p.itens||[]).forEach(i=>{const pr=produtos.find(x=>x.id===i.prodId);const k=pr?pr.nome:'Outros';if(!topProd[k])topProd[k]=0;topProd[k]+=Number(i.total||0);}));
    const topList=Object.entries(topProd).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const maxTop=topList[0]?.[1]||1;
    const cores=['#e8197a','#7c3aed','#2563eb','#00b8c4','#16a34a'];

    // Fluxo últimas 4 semanas
    const semanas4=[];
    for(let s=3;s>=0;s--){
      const ini=new Date(now);ini.setDate(now.getDate()-s*7-now.getDay());
      const fim=new Date(ini);fim.setDate(ini.getDate()+6);
      const label=`${ini.getDate()}/${ini.getMonth()+1}`;
      const rec=recebimentos.filter(r=>{if(!r.data)return false;const d=new Date(r.data+' 00:00');return d>=ini&&d<=fim;}).reduce((s,r)=>s+Number(r.valor||0),0);
      const pag=pagamentos.filter(p=>{if(!p.data)return false;const d=new Date(p.data+' 00:00');return d>=ini&&d<=fim;}).reduce((s,p)=>s+Number(p.valor||0),0);
      semanas4.push({label,rec,pag});
    }
    const maxSem=Math.max(...semanas4.map(s=>Math.max(s.rec,s.pag)),1);
    const svgH=90;
    let svgBars='';
    semanas4.forEach((s,i)=>{
      const x=50+i*110;
      const hR=s.rec>0?Math.round(s.rec/maxSem*(svgH-20)):2;
      const hP=s.pag>0?Math.round(s.pag/maxSem*(svgH-20)):2;
      svgBars+=`
        <rect x="${x-20}" y="${svgH-hR}" width="18" height="${hR}" rx="3" fill="#16a34a" opacity=".85"/>
        <rect x="${x+2}" y="${svgH-hP}" width="18" height="${hP}" rx="3" fill="#dc4a3d" opacity=".85"/>
        <text x="${x}" y="${svgH+12}" text-anchor="middle" font-size="10" font-weight="600" fill="#a090b0">${s.label}</text>
        ${s.rec>0?`<text x="${x-11}" y="${svgH-hR-4}" text-anchor="middle" font-size="9" font-weight="700" fill="#16a34a">${fmtK(s.rec).replace('R$ ','')}</text>`:''}`;
    });

    document.getElementById('charts-grid').innerHTML=`
      <div class="chart-card">
        <div class="chart-header"><div class="chart-title">Top Produtos do Mês</div></div>
        <div class="chart-body">
          ${topList.length?topList.map(([nome,val],i)=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px">
              <div style="font-weight:600;color:var(--text2);width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nome}</div>
              <div style="flex:1;background:var(--bg);border-radius:20px;height:18px;overflow:hidden;position:relative">
                <div style="height:100%;border-radius:20px;background:${cores[i]};width:${Math.round(val/maxTop*100)}%;display:flex;align-items:center;padding-left:6px">
                  <span style="font-size:10px;font-weight:700;color:#fff;white-space:nowrap">${Math.round(val/maxTop*100)}%</span>
                </div>
              </div>
              <div style="font-weight:800;width:70px;text-align:right;color:${cores[i]}">${fmtK(val)}</div>
            </div>`).join(''):'<div class="mini-empty">Nenhum pedido este mês</div>'}
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <div class="chart-title">Entradas vs Saídas (4 semanas)</div>
          <div style="display:flex;gap:10px;font-size:10px;font-weight:700">
            <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--green);display:inline-block"></span>Entradas</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:var(--red);display:inline-block"></span>Saídas</span>
          </div>
        </div>
        <div class="chart-body">
          <svg viewBox="0 0 480 ${svgH+20}" style="width:100%;height:auto">${svgBars}</svg>
        </div>
      </div>`;

    // ===== ESTOQUE + PRODUÇÃO + FACCIONISTAS =====
    const estRows=[
      {icon:'○',nome:'Poliéster',val:Number(estoque.mp?.PES||0).toFixed(2)+' kg',low:(estoque.mp?.PES||0)<5},
      {icon:'○',nome:'Elastano',val:Number(estoque.mp?.ELA||0).toFixed(2)+' kg',low:(estoque.mp?.ELA||0)<1},
      {icon:'○',nome:'Cru',val:Number(Object.values(estoque.cru||{}).reduce((s,x)=>s+Number(x.kg||0),0)).toFixed(2)+' kg'},
      {icon:'○',nome:'Virado',val:Number(Object.values(estoque.virado||{}).reduce((s,x)=>s+Number(x.kg||0),0)).toFixed(2)+' kg'},
      {icon:'○',nome:'Embalado',val:Object.values(estoque.embalado||{}).reduce((s,x)=>s+Number(x.pacotes||0),0)+' pacotes'},
    ];

    document.getElementById('bottom3-grid').innerHTML=`
      <div class="card">
        <div class="card-header"><div class="card-title">Estoque</div><a class="card-link" href="estoque.html">Ver</a></div>
        ${estRows.map(r=>`<div class="est-row">
          <span class="est-icon" style="color:${r.low?'var(--red)':'var(--text3)'}">${r.icon}</span>
          <div class="est-info"><div class="est-nome">${r.nome}</div></div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:12px;font-weight:700">${r.val}</span>
            ${r.low?`<span class="est-status" style="background:var(--red-light);color:var(--red)">Baixo</span>`:''}
          </div>
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Producao Hoje</div><a class="card-link" href="producao.html">Ver</a></div>
        <div class="prod-row"><span style="color:var(--text2);font-weight:600">Maquina</span><span style="font-weight:800">${kgHoje.toFixed(3)} kg</span></div>
        <div class="prod-row"><span style="color:var(--text2);font-weight:600">Lotes virando</span><span style="font-weight:800">${virando.length} lote(s)</span></div>
        <div class="prod-row"><span style="color:var(--text2);font-weight:600">Kg na rua</span><span style="font-weight:800">${virando.reduce((s,e)=>s+Number(e.kg||0),0).toFixed(2)} kg</span></div>
        <div class="prod-row"><span style="color:var(--text2);font-weight:600">Embalados hoje</span><span style="font-weight:800">${producoes.filter(p=>p.data===hoje&&p.etapa==='embalagem').reduce((s,p)=>s+Number(p.pacotes||0),0)} pct</span></div>
        <div class="prod-row" style="background:var(--bg)"><span style="color:var(--text2);font-weight:600">A pagar facc.</span><span style="font-weight:800;color:var(--orange)">${fmt(aPagarFacc)}</span></div>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Faccionistas</div><a class="card-link" href="producao.html">Ver</a></div>
        ${faccionistas.length?faccionistas.map(f=>{
          const loteFora=envios.filter(e=>e.faccId===f.id&&e.status==='enviado');
          const pendente=envios.filter(e=>e.faccId===f.id&&e.status==='devolvido'&&!e.pago).reduce((s,e)=>s+Number(e.valor||0),0);
          return `<div class="facc-row">
            <div class="facc-av" style="background:${f.cor||'var(--purple)'}">${f.nome.charAt(0)}</div>
            <div class="facc-info"><div class="facc-nome">${f.nome}</div><div class="facc-meta">${loteFora.length>0?loteFora.length+' lote(s) fora':'Sem lotes fora'}</div></div>
            <span style="font-size:11px;font-weight:800;color:${pendente>0?'var(--orange)':'var(--green)'}">${pendente>0?fmt(pendente):'Em dia'}</span>
          </div>`;
        }).join(''):`<div class="mini-empty">Nenhuma faccionista</div>`}
      </div>`;

    renderDiagnostico({pedidos,clientes,produtos,producoes,envios,faccionistas,compras,estoque,recebimentos,pagamentos,despesas,
      leads:JSON.parse(localStorage.getItem('allhair_leads')||'[]'),
      config,metas,fatBruto,receitaMes,despesasMes,lucro,margem,filaAberta,pedAtraso,totalReceber,totalPagar,mes,ano,diasPassados,diasNoMes,noMes});
  }

  function renderDiagnostico(params){
    const {pedidos,clientes,produtos,producoes,envios,faccionistas,compras,estoque,recebimentos,pagamentos,despesas,leads,config,metas,fatBruto,receitaMes,despesasMes,lucro,margem,filaAberta,pedAtraso,totalReceber,totalPagar,mes,ano,diasPassados,diasNoMes,noMes} = params;

    const itens = [];

    // ── FINANCEIRO ──
    if(margem >= 30) itens.push({area:'Financeiro',status:'ok',msg:'Margem de lucro saudável',sub:`${margem.toFixed(1)}% — acima dos 30% recomendados para o setor`});
    else if(margem >= 15) itens.push({area:'Financeiro',status:'warn',msg:'Margem abaixo do ideal',sub:`${margem.toFixed(1)}% — meta recomendada é 30%+`});
    else if(receitaMes>0) itens.push({area:'Financeiro',status:'bad',msg:'Margem crítica',sub:`${margem.toFixed(1)}% — revise custos de produção e preços`});

    const vencidos=pedidos.filter(p=>p.status!=='finalizado'&&getSaldo(p)>0&&p.vencimento&&new Date(p.vencimento+' 00:00')<new Date());
    if(vencidos.length===0&&totalReceber>0) itens.push({area:'Financeiro',status:'ok',msg:'Recebíveis em dia',sub:`${fmt(totalReceber)} a receber — sem boletos vencidos`});
    else if(vencidos.length>0) itens.push({area:'Financeiro',status:'bad',msg:`${vencidos.length} boleto(s) vencido(s)`,sub:`${fmt(vencidos.reduce((s,p)=>s+getSaldo(p),0))} em atraso — cobrar com urgência`});

    const caixaData=JSON.parse(localStorage.getItem('allhair_caixa')||'{}');
    const saldoInicial=parseFloat(caixaData['saldo-inicial']||0);
    const entradas=recebimentos.reduce((s,r)=>s+Number(r.valor||0),0);
    const saidas=pagamentos.reduce((s,p)=>s+Number(p.valor||0),0);
    const saldo=saldoInicial+entradas-saidas;
    const fixasMes=despesas.filter(d=>d.tipo==='fixo'&&d.ativo).reduce((s,d)=>s+Number(d.valor||0),0);
    const reserva=fixasMes*2;
    if(reserva>0){
      if(saldo>=reserva) itens.push({area:'Caixa',status:'ok',msg:'Caixa seguro',sub:`${fmt(saldo)} em conta — ${Math.round(saldo/fixasMes*10)/10} meses de reserva`});
      else if(saldo>=reserva*0.5) itens.push({area:'Caixa',status:'warn',msg:'Caixa abaixo do ideal',sub:`${fmt(saldo)} — meta de reserva é ${fmt(reserva)} (2 meses)`});
      else itens.push({area:'Caixa',status:'bad',msg:'Caixa crítico',sub:`Apenas ${fmt(saldo)} — reforce o caixa imediatamente`});
    }

    // ── PRODUÇÃO ──
    if(pedAtraso.length===0&&filaAberta.length>0) itens.push({area:'Produção',status:'ok',msg:'Todas as entregas no prazo',sub:`${filaAberta.length} pedido(s) em aberto — sem atrasos`});
    else if(pedAtraso.length===0&&filaAberta.length===0) itens.push({area:'Produção',status:'ok',msg:'Fila de produção vazia',sub:'Nenhum pedido em aberto no momento'});
    else itens.push({area:'Produção',status:'bad',msg:`${pedAtraso.length} pedido(s) em atraso`,sub:pedAtraso.map(p=>p.clienteNome).join(', ')});

    const kgHoje=producoes.filter(p=>p.data===new Date().toISOString().split('T')[0]&&p.etapa==='maquina').reduce((s,p)=>s+Number(p.kg||0),0);
    if(kgHoje>0) itens.push({area:'Produção',status:'ok',msg:'Produção ativa hoje',sub:`${kgHoje.toFixed(2)}kg produzidos hoje na máquina`});
    else itens.push({area:'Produção',status:'warn',msg:'Sem produção registrada hoje',sub:'Nenhum lançamento de máquina hoje'});

    const virando=envios.filter(e=>e.status==='enviado');
    if(virando.length>0) itens.push({area:'Produção',status:'ok',msg:`${virando.length} lote(s) com faccionista`,sub:`${virando.reduce((s,e)=>s+Number(e.kg||0),0).toFixed(2)}kg em processo de virar`});

    // ── ESTOQUE ──
    const pesBaixo=(estoque.mp?.PES||0)<5;
    const elaBaixo=(estoque.mp?.ELA||0)<1;
    if(!pesBaixo&&!elaBaixo) itens.push({area:'Estoque',status:'ok',msg:'Matéria-prima abastecida',sub:`PES: ${(estoque.mp?.PES||0).toFixed(2)}kg · ELA: ${(estoque.mp?.ELA||0).toFixed(2)}kg`});
    if(pesBaixo) itens.push({area:'Estoque',status:'bad',msg:'Poliéster acabando',sub:`Apenas ${(estoque.mp?.PES||0).toFixed(2)}kg — comprar urgente`});
    if(elaBaixo) itens.push({area:'Estoque',status:'bad',msg:'Elastano acabando',sub:`Apenas ${(estoque.mp?.ELA||0).toFixed(2)}kg — comprar urgente`});

    const embTotal=Object.values(estoque.embalado||{}).reduce((s,x)=>s+Number(x.pacotes||0),0);
    if(embTotal>0) itens.push({area:'Estoque',status:'ok',msg:'Pronta entrega disponível',sub:`${embTotal} pacotes embalados prontos para expedir`});
    else itens.push({area:'Estoque',status:'warn',msg:'Sem estoque de pronta entrega',sub:'Nenhum produto embalado disponível'});

    // ── VENDAS / CRM ──
    const metaFat=Number(metas.fat||0);
    const projecao=diasPassados>0?fatBruto/(diasPassados/diasNoMes):0;
    if(metaFat>0){
      const pct=fatBruto/metaFat*100;
      const noRitmo=projecao>=metaFat*0.9;
      if(pct>=100) itens.push({area:'Vendas',status:'ok',msg:'Meta do mês batida!',sub:`${fmt(fatBruto)} faturado — ${pct.toFixed(0)}% da meta`});
      else if(noRitmo) itens.push({area:'Vendas',status:'ok',msg:'No ritmo para bater a meta',sub:`Projeção ${fmt(projecao)} — meta ${fmt(metaFat)}`});
      else itens.push({area:'Vendas',status:'warn',msg:'Ritmo abaixo da meta',sub:`Projeção ${fmt(projecao)} de ${fmt(metaFat)} — acelere as vendas`});
    }

    const leadsAtivos=(leads||[]).filter(l=>!['fechado','perdido'].includes(l.etapa));
    const semContato=leadsAtivos.filter(l=>{const d=l.ultimoContato||l.data;if(!d)return true;return Math.ceil((new Date()-new Date(d+' 00:00'))/(1000*60*60*24))>7;});
    if(leadsAtivos.length===0) itens.push({area:'CRM',status:'warn',msg:'Nenhum lead em prospecção',sub:'Inicie novas prospecções para garantir crescimento'});
    else if(semContato.length>0) itens.push({area:'CRM',status:'warn',msg:`${semContato.length} lead(s) sem contato há +7 dias`,sub:'Retome o contato para não perder oportunidades'});
    else itens.push({area:'CRM',status:'ok',msg:`${leadsAtivos.length} lead(s) ativos em dia`,sub:'Prospecção em andamento com follow-up em dia'});

    // ── CLIENTES RECORRENTES ──
    const recorrentes=clientes.filter(c=>c.recorrente&&c.status==='ativo');
    recorrentes.forEach(c=>{
      if(!c.proximaEntrega)return;
      const dias=Math.ceil((new Date(c.proximaEntrega+' 00:00')-new Date())/(1000*60*60*24));
      if(dias<=3&&dias>=0) itens.push({area:'Clientes',status:'warn',msg:`Entrega de ${c.nome} em ${dias===0?'hoje':dias+' dia(s)'}`,sub:'Confirme o pedido e verifique o estoque'});
      else if(dias<0) itens.push({area:'Clientes',status:'bad',msg:`Entrega de ${c.nome} atrasada`,sub:`${Math.abs(dias)} dia(s) de atraso na programação`});
    });

    if(!itens.length){
      document.getElementById('diagnostico-wrap').innerHTML='';
      return;
    }

    const bons=itens.filter(i=>i.status==='ok');
    const atencao=itens.filter(i=>i.status==='warn');
    const criticos=itens.filter(i=>i.status==='bad');

    const scoreTotal=Math.round((bons.length/itens.length)*100);
    const scoreCor=scoreTotal>=80?'var(--green)':scoreTotal>=60?'var(--yellow)':'var(--red)';
    const scoreLabel=scoreTotal>=80?'Empresa saudável':scoreTotal>=60?'Atenção necessária':'Situação crítica';

    const itemHtml=items=>items.map(i=>`
      <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--white);border-radius:var(--radius-sm);border-left:3px solid ${i.status==='ok'?'var(--green)':i.status==='warn'?'var(--yellow)':'var(--red)'}">
        <span style="font-size:16px;flex-shrink:0">${i.status==='ok'?'✓':i.status==='warn'?'!':'✕'}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:${i.status==='ok'?'var(--green)':i.status==='warn'?'#92400e':'var(--red)'}">${i.area} — ${i.msg}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${i.sub}</div>
        </div>
      </div>`).join('');

    document.getElementById('diagnostico-wrap').innerHTML=`
      <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden">
        <div style="padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:15px;font-weight:800">Diagnóstico da Empresa</div>
            <div style="font-size:12px;color:var(--text2);margin-top:2px">Análise automática baseada nos seus dados em tempo real</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:32px;font-weight:800;color:${scoreCor}">${scoreTotal}%</div>
            <div style="font-size:11px;font-weight:700;color:${scoreCor}">${scoreLabel}</div>
          </div>
        </div>
        <div style="padding:18px 22px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
          ${criticos.length?`<div style="grid-column:1/-1">
            <div style="font-size:12px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Crítico — ação imediata</div>
            <div style="display:flex;flex-direction:column;gap:6px">${itemHtml(criticos)}</div>
          </div>`:''}
          ${atencao.length?`<div>
            <div style="font-size:12px;font-weight:800;color:#92400e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Atenção</div>
            <div style="display:flex;flex-direction:column;gap:6px">${itemHtml(atencao)}</div>
          </div>`:''}
          ${bons.length?`<div>
            <div style="font-size:12px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Funcionando bem</div>
            <div style="display:flex;flex-direction:column;gap:6px">${itemHtml(bons)}</div>
          </div>`:''}
        </div>
      </div>`;
  }

  function getSaldo(p){return Math.max(0,(p.itens||[]).reduce((s,i)=>s+Number(i.total||0),0)-Number(p.entrada||0));}

  init();
  setInterval(init,60000);
</script>
<script src="firebase-sync.js"></script>

  <div class="modal" style="max-width:780px;max-height:90vh;overflow-y:auto">
    <div class="modal-header">
      <h2 id="avaliacao-titulo">📊 Avaliação Mensal</h2>
      <button class="modal-close" onclick="fecharAvaliacao()">×</button>
    </div>
    <div class="modal-body" id="avaliacao-body" style="padding:0"></div>
  </div>
</div>
